<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Temperatur Anzeige</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="container">
    <h1>Temperatur</h1>
    <div class="temperature-display" id="temperatureDisplay">
      <span class="value" id="temperatureValue">--</span>
      <span class="unit">°C</span>
    </div>
    <p class="last-updated" id="lastUpdated">Noch keine Daten empfangen.</p>
    <a href="/history.html" class="history-btn">Verlauf anzeigen</a>
  </main>

  <script src="app.js"></script>
</body>
</html>
