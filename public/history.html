<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Temperaturverlauf</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      background-image: url('selchfleisch.jpeg');
      padding-top: 0;
      align-items: center;
      justify-content: center;
    }

    .history-container {
      width: min(92vw, 800px);
      padding: 1.5rem;
      background: rgba(0, 0, 0, 0.25);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 16px;
      backdrop-filter: blur(6px);
    }

    .history-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.25rem;
    }

    .history-header h1 {
      margin: 0;
      font-size: 1.1rem;
    }

    .back-btn {
      background: rgba(0, 0, 0, 0.45);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 8px;
      color: #a0c8e0;
      font-family: inherit;
      font-size: 0.85rem;
      letter-spacing: 0.08em;
      padding: 0.4rem 1rem;
      cursor: pointer;
      backdrop-filter: blur(6px);
      text-decoration: none;
      transition: background 0.2s, border-color 0.2s;
    }

    .back-btn:hover {
      background: rgba(126, 184, 218, 0.2);
      border-color: rgba(126, 184, 218, 0.5);
    }

    .chart-controls {
      display: flex;
      justify-content: flex-end;
      gap: 0.5rem;
      margin-top: 0.75rem;
    }

    .chart-hint {
      color: #808080;
      font-size: 0.75rem;
      align-self: center;
      margin-right: auto;
    }

    .reset-btn {
      background: rgba(0, 0, 0, 0.45);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 8px;
      color: #a0c8e0;
      font-family: inherit;
      font-size: 0.8rem;
      letter-spacing: 0.06em;
      padding: 0.35rem 0.9rem;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
    }

    .reset-btn:hover {
      background: rgba(126, 184, 218, 0.2);
      border-color: rgba(126, 184, 218, 0.5);
    }
  </style>
</head>
<body>
  <div class="history-container">
    <div class="history-header">
      <h1>Temperaturverlauf</h1>
      <a href="/" class="back-btn">← Zurück</a>
    </div>
    <canvas id="historyChart"></canvas>
    <div class="chart-controls">
      <span class="chart-hint">Scrollen zum Zoomen · Ziehen zum Verschieben</span>
      <button class="reset-btn" id="resetZoom">Zoom zurücksetzen</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8/hammer.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1/dist/chartjs-plugin-zoom.min.js"></script>
  <script>
    fetch('/api/temperature/history')
      .then(res => res.json())
      .then(data => {
        const labels = data.map(e => {
          const d = new Date(e.timestamp);
          return d.toLocaleString('de-DE', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' });
        });
        const values = data.map(e => e.temperature);

        const chart = new Chart(document.getElementById('historyChart'), {
          type: 'line',
          data: {
            labels,
            datasets: [{
              label: 'Temperatur (°C)',
              data: values,
              borderColor: '#7eb8da',
              backgroundColor: 'rgba(126, 184, 218, 0.1)',
              borderWidth: 2,
              pointRadius: data.length > 100 ? 0 : 3,
              tension: 0.3,
              fill: true,
            }]
          },
          options: {
            responsive: true,
            plugins: {
              legend: { labels: { color: '#e8e8e8' } },
              zoom: {
                zoom: {
                  wheel: { enabled: true },
                  pinch: { enabled: true },
                  mode: 'x',
                },
                pan: {
                  enabled: true,
                  mode: 'x',
                },
              }
            },
            scales: {
              x: {
                ticks: { color: '#a0a0a0', maxTicksLimit: 8, maxRotation: 30 },
                grid: { color: 'rgba(255,255,255,0.08)' }
              },
              y: {
                ticks: { color: '#a0a0a0' },
                grid: { color: 'rgba(255,255,255,0.08)' }
              }
            }
          }
        });

        document.getElementById('resetZoom').addEventListener('click', () => chart.resetZoom());
      });
  </script>
</body>
</html>
